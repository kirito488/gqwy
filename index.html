<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>怪奇物语性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 0, 100, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(100, 0, 200, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 0, 100, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.8);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        .start-screen-content {
            position: relative;
            z-index: 10;
        }

        .stranger-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stranger-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3), rgba(100, 0, 200, 0.3));
            border: 2px solid rgba(255, 0, 100, 0.5);
            animation: iconPulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .stranger-icon:nth-child(1) { animation-delay: 0s; }
        .stranger-icon:nth-child(2) { animation-delay: 0.4s; }
        .stranger-icon:nth-child(3) { animation-delay: 0.8s; }
        .stranger-icon:nth-child(4) { animation-delay: 1.2s; }
        .stranger-icon:nth-child(5) { animation-delay: 1.6s; }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(255, 0, 100, 0.6);
            }
        }

        .title {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 20px;
            letter-spacing: 3px;
            position: relative;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: titleFlicker 4s ease-in-out infinite;
            text-transform: uppercase;
        }
        
        .title::after {
            content: '怪奇物语性格测试';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes titleFlicker {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.8)) drop-shadow(0 0 60px rgba(0, 200, 255, 0.4));
            }
        }

        .subtitle-container {
            margin-bottom: 45px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #ff6699;
            margin-bottom: 10px;
            opacity: 0.95;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        .subtitle-detail {
            font-size: 1.05rem;
            color: rgba(0, 200, 255, 0.8);
            margin-top: 10px;
            font-style: italic;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff0066 0%, #6600cc 100%);
            border: 2px solid rgba(255, 0, 100, 0.6);
            padding: 20px 65px;
            font-size: 1.35rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.7),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.9);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .start-screen-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 0, 100, 0.3);
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 0, 100, 0.9);
            margin: 0;
            animation: textGlow 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        @keyframes textGlow {
            0%, 100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 0, 100, 0.8);
            }
        }

        .quiz-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(100, 0, 200, 0.05) 100%);
            border-radius: 12px;
            padding: 40px 35px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 100, 0.2), 0 0 60px rgba(100, 0, 200, 0.1);
        }

        .quiz-header {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #00c8ff, #ff0066);
            background-size: 200% 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.6);
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .question-number {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.15rem;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .encouragement-text {
            color: rgba(0, 200, 255, 0.9);
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            color: #e8eef5;
            font-size: 1.45rem;
            margin-bottom: 40px;
            line-height: 1.7;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(100, 0, 200, 0.05) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            padding: 20px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #d4dce8;
            font-size: 1.1rem;
            min-height: 68px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            overflow: visible;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .option:hover {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.2) 0%, rgba(255, 0, 100, 0.1) 100%);
            border-color: rgba(255, 0, 100, 0.6);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.2);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3), inset 0 0 10px rgba(255, 0, 100, 0.1);
        }

        .option-letter {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff0066, #6600cc);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            margin-right: 16px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            border: 1px solid rgba(255, 0, 100, 0.4);
        }

        .option-feedback {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ff0066, #6600cc);
            color: #fff;
            padding: 7px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            animation: feedbackSlide 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            white-space: nowrap;
        }

        @keyframes feedbackSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.15) 0%, rgba(100, 0, 200, 0.1) 100%);
            border: 2px solid rgba(255, 0, 100, 0.4);
            padding: 15px 42px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #ff0066;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.25) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3);
        }

        .nav-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #ff0066, #6600cc);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5);
        }

        .fun-tip {
            color: rgba(0, 200, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            background: rgba(255, 0, 100, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 100, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(100, 0, 200, 0.05) 100%);
            border-radius: 12px;
            padding: 45px 35px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.2), 0 0 80px rgba(100, 0, 200, 0.1);
        }

        .result-type {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .result-character {
            font-size: 3.6rem;
            background: linear-gradient(135deg, #fff 0%, #ff0066 50%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: characterPulse 3s ease-in-out infinite;
        }

        @keyframes characterPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.7));
            }
        }

        .personality-analysis {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.12) 0%, rgba(100, 0, 200, 0.06) 100%);
            border: 2px solid rgba(255, 0, 100, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.15);
        }

        .personality-analysis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0066, transparent);
        }

        .personality-analysis-title {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .personality-analysis-text {
            color: #d4dce8;
            font-size: 1.05rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .character-intro {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(100, 0, 200, 0.04) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .character-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.6), transparent);
        }

        .character-intro-title {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .character-intro-text {
            color: #d4dce8;
            font-size: 1.15rem;
        }

        .character-traits {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(100, 0, 200, 0.04) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .character-traits::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.6), transparent);
        }

        .character-traits-title {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .trait-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .trait-label {
            width: 120px;
            color: #d4dce8;
            font-weight: bold;
            font-size: 1.05rem;
            flex-shrink: 0;
        }

        .trait-bar-container {
            flex: 1;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 15px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
            min-width: 100px;
        }

        .trait-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #00c8ff);
            border-radius: 6px;
            transition: width 1s ease;
            box-shadow: 0 0 8px rgba(255, 0, 100, 0.6);
        }

        .trait-value {
            width: 50px;
            text-align: right;
            color: #00c8ff;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff0066, #6600cc);
            border: 2px solid rgba(255, 0, 100, 0.5);
            padding: 18px 55px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.6),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.8);
        }

        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            .title {
                font-size: 2rem;
            }

            .quiz-container, .result-container {
                padding: 22px 18px;
            }

            .question-text {
                font-size: 1.15rem;
                margin-bottom: 28px;
            }

            .option {
                padding: 14px 16px;
                font-size: 0.92rem;
            }

            .nav-btn {
                padding: 11px 22px;
                font-size: 0.9rem;
            }

            .result-type {
                font-size: 1.15rem;
            }

            .result-character {
                font-size: 2.2rem;
            }

            .personality-analysis, .character-intro {
                padding: 18px;
            }

            .personality-analysis-title, .character-intro-title {
                font-size: 1.05rem;
            }

            .personality-analysis-text, .character-intro-text {
                font-size: 0.98rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.7rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.98rem;
            }

            .subtitle-detail {
                font-size: 0.88rem;
            }

            .stranger-icons {
                gap: 10px;
                margin-bottom: 18px;
            }

            .stranger-icon {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }

            .start-btn {
                padding: 13px 35px;
                font-size: 1.05rem;
            }

            .start-screen-footer {
                margin-top: 35px;
                padding-top: 18px;
            }

            .footer-text {
                font-size: 0.82rem;
            }

            .result-character {
                font-size: 1.9rem;
            }

            .option {
                padding: 13px 15px;
                font-size: 0.9rem;
            }

            .option-letter {
                width: 30px;
                height: 30px;
                line-height: 30px;
                margin-right: 12px;
            }

            .encouragement-text {
                font-size: 0.78rem;
            }

            .fun-tip {
                font-size: 0.72rem;
                padding: 8px;
            }

            .option-feedback {
                font-size: 0.72rem;
                padding: 5px 10px;
                right: 10px;
            }
        }

            "勇敢守护型": ["Jim Hopper（吉姆·霍珀）", "Steve Harrington（史蒂夫·哈灵顿）", "Max Mayfield（麦克斯·梅菲尔德）"],
            "温暖伙伴型": ["Joyce Byers（乔伊斯·拜尔斯）", "Dustin Henderson（达斯汀·亨德森）"],
            "独立神秘型": ["Mike Wheeler（迈克·惠勒）", "Will Byers（威尔·拜尔斯）"],
            "叛逆创新型": ["Eddie Munson（埃迪·芒森）"]
        };

        const personalityAnalysis = {
            "智慧探索型": "你拥有敏锐的洞察力和强大的逻辑思维能力。面对未知，你总是充满好奇心，渴望探索真相。你相信知识和理性，善于分析问题并找到解决方案。你的独特视角让你能看到别人看不到的东西，这使你成为团队中不可或缺的智慧担当。",
            "勇敢守护型": "你拥有无畏的勇气和强烈的正义感。面对危险，你总是冲在最前面，保护你爱的人。你的行动力极强，说到做到。虽然有时会显得冲动，但你的心始终是善良的。你是天生的守护者，愿意为了正义和友情付出一切。",
            "温暖伙伴型": "你拥有一颗温暖善良的心，总是能在他人需要时给予支持。你重视友情和信任，是团队中的粘合剂。你善于理解他人的感受，愿意为了朋友付出。你的存在让周围的人感到安心和温暖，你是真正的朋友。",
            "独立神秘型": "你拥有独立的思维和神秘的气质。你善于观察，喜欢独自思考。你不随波逐流，有自己的判断和坚持。虽然有时显得孤独，但你的内心深处渴望真正的连接。你的独特让你在关键时刻总能发现别人忽略的东西。",
            "叛逆创新型": "你拥有叛逆的精神和创新的思维。你不墨守成规，总是寻求新的可能性。你勇敢挑战权威，敢于打破常规。虽然有时显得特立独行，但你的创意和勇气往往能带来意想不到的突破。你是真正的开拓者，愿意为了理想而奋斗。"
        };

        const characterIntros = {
            "Eleven（十一）": "Eleven是一个拥有超能力的神秘女孩，她经历了残酷的实验，但内心依然保持着善良和纯真。她拥有强大的精神力量，同时也在学习如何成为一个普通女孩。她的勇气和牺牲精神让她成为保护朋友的重要力量。",
            "Nancy Wheeler（南希·惠勒）": "Nancy是一个聪明勇敢的女孩，从最初的普通高中生成长为一名勇敢的调查记者。她追求真相，不畏危险，有着强烈的正义感。她的智慧和勇气让她在面对超自然威胁时成为重要的战斗力。",
            "Jim Hopper（吉姆·霍珀）": "Hopper是霍金斯镇的警长，一个外表粗犷但内心善良的人。他经历了失去女儿的痛苦，但依然选择保护他人。他的责任感和勇气让他成为小镇的守护者，愿意为了保护孩子们付出一切。",
            "Steve Harrington（史蒂夫·哈灵顿）": "Steve从一个典型的校园风云人物成长为一个真正的英雄。他勇敢、善良，愿意为了保护孩子们冒险。他的成长让他从一个自私的少年变成了一个有担当的男人，被称为'最好的保姆'。",
            "Max Mayfield（麦克斯·梅菲尔德）": "Max是一个独立勇敢的女孩，她喜欢滑板，有着叛逆的性格。她经历了失去哥哥的痛苦，但依然坚强。她的勇气和独立精神让她成为团队中的重要成员。",
            "Joyce Byers（乔伊斯·拜尔斯）": "Joyce是一个坚强勇敢的母亲，为了救儿子她愿意相信任何可能性。她的母爱让她能够跨越现实的边界。她的坚持和勇气证明了爱的力量是无穷的。",
            "Dustin Henderson（达斯汀·亨德森）": "Dustin是一个聪明幽默的男孩，他对科学充满热情。他的乐观和幽默总能在困难时刻带来希望。他的智慧和勇气让他成为团队中的技术担当。",
            "Mike Wheeler（迈克·惠勒）": "Mike是一个忠诚善良的男孩，他是团队的领导者之一。他对朋友有着深厚的感情，愿意为了他们付出一切。他的领导力和忠诚让他成为团队的核心。",
            "Will Byers（威尔·拜尔斯）": "Will是一个敏感善良的男孩，他经历了逆世界的恐怖，但依然保持着纯真的心。他与逆世界的特殊联系让他成为关键人物。他的经历让他比同龄人更加成熟和深刻。",
            "Eddie Munson（埃迪·芒森）": "Eddie是一个叛逆的摇滚青年，他领导着地狱火俱乐部。他勇敢反抗社会的偏见，坚持自己的信念。他的牺牲精神和对朋友的忠诚让他成为真正的英雄。"
        };

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(undefined);

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function startSurvey() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            currentQuestion = 0;
            answers = new Array(questions.length).fill(undefined);
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = `问题 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').textContent = question.text;
            
            const progressPercent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progressPercent + '%';
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D', 'E'];
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option' + (answers[currentQuestion] === index ? ' selected' : '');
                optionDiv.innerHTML = `
                    <span class="option-letter">${letters[index]}</span>
                    <span class="option-content">${option}</span>
                `;
                if (answers[currentQuestion] === index) {
                    const feedback = document.createElement('span');
                    feedback.className = 'option-feedback';
                    feedback.textContent = '已选择';
                    optionDiv.appendChild(feedback);
                }
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            updateNavigationButtons();
            showEncouragement();
            showFunTip();
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            showQuestion();
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '查看结果';
            } else {
                nextBtn.textContent = '下一题';
            }
        }

        function showEncouragement() {
            const encouragements = [
                "继续探索，真相就在前方...",
                "你的选择揭示了你的内心...",
                "逆世界在等待你的答案...",
                "相信你的直觉...",
                "每一步都在接近真相...",
                "你的勇气正在被考验...",
                "友情的力量与你同在...",
                "神秘的面纱正在揭开..."
            ];
            const randomIndex = Math.floor(Math.random() * encouragements.length);
            document.getElementById('encouragement-text').textContent = encouragements[randomIndex];
        }

        function showFunTip() {
            const tips = [
                "💡 提示：凭直觉选择可能更准确哦~",
                "🎮 就像D&D游戏，每个选择都很重要！",
                "⚡ 逆世界的能量正在流动...",
                "🔮 你的答案正在被分析...",
                "🔦 记得保持好奇心！"
            ];
            const randomIndex = Math.floor(Math.random() * tips.length);
            document.getElementById('fun-tip').textContent = tips[randomIndex];
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert('请选择一个选项！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                finishSurvey();
            }
        }

        function getCharacterTraits(character) {
            const traits = {
    "Eleven（十一）": { 勇气: 90, 智慧: 80, 善良: 85, 独立: 85, 创新: 75 },
    "Nancy Wheeler（南希·惠勒）": { 勇气: 85, 智慧: 90, 善良: 85, 独立: 80, 创新: 70 },
    "Jim Hopper（吉姆·霍珀）": { 勇气: 95, 智慧: 85, 善良: 85, 独立: 90, 创新: 65 },
    "Steve Harrington（史蒂夫·哈灵顿）": { 勇气: 90, 智慧: 80, 善良: 90, 独立: 80, 创新: 70 },
    "Max Mayfield（麦克斯·梅菲尔德）": { 勇气: 95, 智慧: 75, 善良: 80, 独立: 90, 创新: 75 },
    "Joyce Byers（乔伊斯·拜尔斯）": { 勇气: 95, 智慧: 90, 善良: 95, 独立: 75, 创新: 80 },
    "Dustin Henderson（达斯汀·亨德森）": { 勇气: 80, 智慧: 90, 善良: 85, 独立: 75, 创新: 80 },
    "Mike Wheeler（迈克·惠勒）": { 勇气: 85, 智慧: 85, 善良: 90, 独立: 80, 创新: 70 },
    "Will Byers（威尔·拜尔斯）": { 勇气: 80, 智慧: 80, 善良: 90, 独立: 70, 创新: 70 },
    "Eddie Munson（埃迪·芒森）": { 勇气: 95, 智慧: 85, 善良: 85, 独立: 90, 创新: 85 } // 核心调整：95→85
};
            return traits[character] || { 勇气: 50, 智慧: 50, 善良: 50, 独立: 50, 创新: 50 };
        }

        function finishSurvey() {
            const optionCounts = [0, 0, 0, 0, 0];
            
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] !== undefined) {
                    optionCounts[answers[i]]++;
                }
            }
            
            let maxCount = -1;
            let maxIndex = 0;
            for (let i = 0; i < optionCounts.length; i++) {
                if (optionCounts[i] > maxCount) {
                    maxCount = optionCounts[i];
                    maxIndex = i;
                }
            }
            
            const type = typeMapping[maxIndex];
            const characters = charactersByType[type];
            const randomIndex = Math.floor(Math.random() * characters.length);
            const character = characters[randomIndex];
            const traits = getCharacterTraits(character);
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-character').textContent = character;
            
            document.getElementById('personality-analysis').innerHTML = `
                <div class="personality-analysis-title">性格分析</div>
                <div class="personality-analysis-text">${personalityAnalysis[type]}</div>
            `;
            
            document.getElementById('character-intro').innerHTML = `
                <div class="character-intro-title">角色介绍 - ${character}</div>
                <div class="character-intro-text">${characterIntros[character]}</div>
            `;
            
            const traitsHTML = `
                <div class="character-traits-title">角色特质</div>
                ${Object.entries(traits).map(([trait, value]) => `
                    <div class="trait-item">
                        <span class="trait-label">${trait}</span>
                        <div class="trait-bar-container">
                            <div class="trait-bar" style="width: ${value}%"></div>
                        </div>
                        <span class="trait-value">${value}%</span>
                    </div>
                `).join('')}
            `;
            
            const traitsContainer = document.createElement('div');
            traitsContainer.className = 'character-traits';
            traitsContainer.innerHTML = traitsHTML;
            
            const restartBtn = document.querySelector('.restart-btn');
            if (restartBtn) {
                restartBtn.parentNode.insertBefore(traitsContainer, restartBtn);
            }
        }

        function restartSurvey() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            currentQuestion = 0;
            answers = new Array(questions.length).fill(undefined);
        }

        createParticles();
    </script>
</body>
</html>
