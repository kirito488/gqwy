<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>怪奇物语性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 0, 100, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(100, 0, 200, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 0, 100, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.8);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 30px;
            width: 100%;
            max-width: 750px;
            position: relative;
        }

        .start-screen-content {
            position: relative;
            z-index: 10;
        }

        .stranger-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stranger-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3), rgba(100, 0, 200, 0.3));
            border: 2px solid rgba(255, 0, 100, 0.5);
            animation: iconPulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .stranger-icon:nth-child(1) { animation-delay: 0s; }
        .stranger-icon:nth-child(2) { animation-delay: 0.4s; }
        .stranger-icon:nth-child(3) { animation-delay: 0.8s; }
        .stranger-icon:nth-child(4) { animation-delay: 1.2s; }
        .stranger-icon:nth-child(5) { animation-delay: 1.6s; }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(255, 0, 100, 0.6);
            }
        }

        .title {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 15px;
            letter-spacing: 3px;
            position: relative;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: titleFlicker 4s ease-in-out infinite;
            text-transform: uppercase;
        }
        
        .title::after {
            content: '怪奇物语性格测试';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes titleFlicker {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.8)) drop-shadow(0 0 60px rgba(0, 200, 255, 0.4));
            }
        }

        .subtitle-container {
            margin-bottom: 40px;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #ff6699;
            margin-bottom: 8px;
            opacity: 0.95;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        .subtitle-detail {
            font-size: 0.95rem;
            color: rgba(0, 200, 255, 0.8);
            margin-top: 8px;
            font-style: italic;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff0066 0%, #6600cc 100%);
            border: 2px solid rgba(255, 0, 100, 0.6);
            padding: 16px 55px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.7),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.9);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .start-screen-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 0, 100, 0.3);
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 0, 100, 0.9);
            margin: 0;
            animation: textGlow 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        @keyframes textGlow {
            0%, 100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 0, 100, 0.8);
            }
        }

        .quiz-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(100, 0, 200, 0.05) 100%);
            border-radius: 12px;
            padding: 35px 30px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 100, 0.2), 0 0 60px rgba(100, 0, 200, 0.1);
        }

        .quiz-header {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #00c8ff, #ff0066);
            background-size: 200% 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.6);
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .question-number {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.05rem;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .encouragement-text {
            color: rgba(0, 200, 255, 0.9);
            font-size: 0.85rem;
            font-style: italic;
            margin-bottom: 12px;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            color: #e8eef5;
            font-size: 1.3rem;
            margin-bottom: 35px;
            line-height: 1.7;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .option {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(100, 0, 200, 0.05) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            padding: 16px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #d4dce8;
            font-size: 0.98rem;
            min-height: 58px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            overflow: visible;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .option:hover {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.2) 0%, rgba(255, 0, 100, 0.1) 100%);
            border-color: rgba(255, 0, 100, 0.6);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.2);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3), inset 0 0 10px rgba(255, 0, 100, 0.1);
        }

        .option-letter {
            display: inline-block;
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #ff0066, #6600cc);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 34px;
            font-weight: bold;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            border: 1px solid rgba(255, 0, 100, 0.4);
        }

        .option-feedback {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ff0066, #6600cc);
            color: #fff;
            padding: 7px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            animation: feedbackSlide 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            white-space: nowrap;
        }

        @keyframes feedbackSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.15) 0%, rgba(100, 0, 200, 0.1) 100%);
            border: 2px solid rgba(255, 0, 100, 0.4);
            padding: 12px 35px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #ff0066;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.25) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3);
        }

        .nav-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #ff0066, #6600cc);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5);
        }

        .fun-tip {
            color: rgba(0, 200, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            background: rgba(255, 0, 100, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 100, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(100, 0, 200, 0.05) 100%);
            border-radius: 12px;
            padding: 45px 35px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.2), 0 0 80px rgba(100, 0, 200, 0.1);
        }

        .result-type {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .result-character {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #fff 0%, #ff0066 50%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 25px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: characterPulse 3s ease-in-out infinite;
        }

        @keyframes characterPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.7));
            }
        }

        .personality-analysis {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.12) 0%, rgba(100, 0, 200, 0.06) 100%);
            border: 2px solid rgba(255, 0, 100, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.15);
        }

        .personality-analysis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0066, transparent);
        }

        .personality-analysis-title {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .personality-analysis-text {
            color: #d4dce8;
            font-size: 1.05rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .character-intro {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(100, 0, 200, 0.04) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 35px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .character-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.6), transparent);
        }

        .character-intro-title {
            background: linear-gradient(135deg, #ff0066 0%, #00c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .character-intro-text {
            color: #d4dce8;
            font-size: 1.05rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff0066, #6600cc);
            border: 2px solid rgba(255, 0, 100, 0.5);
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.6),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.8);
        }

        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            .title {
                font-size: 2rem;
            }

            .quiz-container, .result-container {
                padding: 22px 18px;
            }

            .question-text {
                font-size: 1.15rem;
                margin-bottom: 28px;
            }

            .option {
                padding: 14px 16px;
                font-size: 0.92rem;
            }

            .nav-btn {
                padding: 11px 22px;
                font-size: 0.9rem;
            }

            .result-type {
                font-size: 1.15rem;
            }

            .result-character {
                font-size: 2.2rem;
            }

            .personality-analysis, .character-intro {
                padding: 18px;
            }

            .personality-analysis-title, .character-intro-title {
                font-size: 1.05rem;
            }

            .personality-analysis-text, .character-intro-text {
                font-size: 0.98rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.7rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.98rem;
            }

            .subtitle-detail {
                font-size: 0.88rem;
            }

            .stranger-icons {
                gap: 10px;
                margin-bottom: 18px;
            }

            .stranger-icon {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }

            .start-btn {
                padding: 13px 35px;
                font-size: 1.05rem;
            }

            .start-screen-footer {
                margin-top: 35px;
                padding-top: 18px;
            }

            .footer-text {
                font-size: 0.82rem;
            }

            .result-character {
                font-size: 1.9rem;
            }

            .option {
                padding: 13px 15px;
                font-size: 0.9rem;
            }

            .option-letter {
                width: 30px;
                height: 30px;
                line-height: 30px;
                margin-right: 12px;
            }

            .encouragement-text {
                font-size: 0.78rem;
            }

            .fun-tip {
                font-size: 0.72rem;
                padding: 8px;
            }

            .option-feedback {
                font-size: 0.72rem;
                padding: 5px 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div id="start-screen">
            <div class="start-screen-content">
                <div class="stranger-icons">
                    <div class="stranger-icon">⚡</div>
                    <div class="stranger-icon">🔮</div>
                    <div class="stranger-icon">🔦</div>
                    <div class="stranger-icon">🎮</div>
                    <div class="stranger-icon">🌐</div>
                </div>
                <h1 class="title">怪奇物语性格测试</h1>
                <div class="subtitle-container">
                    <p class="subtitle">探索你与霍金斯小镇的哪个角色最相似</p>
                    <p class="subtitle-detail">穿越逆世界，发现你的隐藏特质</p>
                </div>
                <button class="start-btn" onclick="startSurvey()">开始测试</button>
                <div class="start-screen-footer">
                    <p class="footer-text">⚡ 逆世界在召唤你...</p>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="quiz-container">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="question-number" id="question-number"></div>
                <div class="encouragement-text" id="encouragement-text"></div>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="nav-btn primary" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
            <div class="fun-tip" id="fun-tip"></div>
        </div>

        <div id="result-screen" class="result-container">
            <div class="result-type" id="result-type"></div>

            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option' + (answers[currentQuestion] === index ? ' selected' : '');
                optionDiv.innerHTML = `
                    <span class="option-letter">${letters[index]}</span>
                    <span class="option-content">${option}</span>
                `;
                if (answers[currentQuestion] === index) {
                    const feedback = document.createElement('span');
                    feedback.className = 'option-feedback';
                    feedback.textContent = '已选择';
                    optionDiv.appendChild(feedback);
                }
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            updateNavigationButtons();
            showEncouragement();
            showFunTip();
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            showQuestion();
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '查看结果';
            } else {
                nextBtn.textContent = '下一题';
            }
        }

        function showEncouragement() {
            const encouragements = [
                "继续探索，真相就在前方...",
                "你的选择揭示了你的内心...",
                "逆世界在等待你的答案...",
                "相信你的直觉...",
                "每一步都在接近真相...",
                "你的勇气正在被考验...",
                "友情的力量与你同在...",
                "神秘的面纱正在揭开..."
            ];
            const randomIndex = Math.floor(Math.random() * encouragements.length);
            document.getElementById('encouragement-text').textContent = encouragements[randomIndex];
        }

        function showFunTip() {
            const tips = [
                "💡 提示：凭直觉选择可能更准确哦~",
                "🎮 就像D&D游戏，每个选择都很重要！",
                "⚡ 逆世界的能量正在流动...",
                "🔮 你的答案正在被分析...",
                "🔦 记得保持好奇心！"
            ];
            const randomIndex = Math.floor(Math.random() * tips.length);
            document.getElementById('fun-tip').textContent = tips[randomIndex];
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert('请选择一个选项！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                finishSurvey();
            }
        }

        function finishSurvey() {
            const optionCounts = [0, 0, 0, 0];
            
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] !== undefined) {
                    optionCounts[answers[i]]++;
                }
            }
            
            let maxCount = -1;
            let maxIndex = 0;
            for (let i = 0; i < optionCounts.length; i++) {
                if (optionCounts[i] > maxCount) {
                    maxCount = optionCounts[i];
                    maxIndex = i;
                }
            }
            
            const type = typeMapping[maxIndex];
            const characters = charactersByType[type];
            const randomIndex = Math.floor(Math.random() * characters.length);
            const character = characters[randomIndex];
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-character').textContent = character;
            
            document.getElementById('personality-analysis').innerHTML = `
                <div class="personality-analysis-title">性格分析</div>
                <div class="personality-analysis-text">${personalityAnalysis[type]}</div>
            `;
            
            document.getElementById('character-intro').innerHTML = `
                <div class="character-intro-title">角色介绍 - ${character}</div>
                <div class="character-intro-text">${characterIntros[character]}</div>
            `;
        }

        function restartSurvey() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            currentQuestion = 0;
            answers = new Array(questions.length).fill(undefined);
        }

        createParticles();
    </script>
</body>
</html>
